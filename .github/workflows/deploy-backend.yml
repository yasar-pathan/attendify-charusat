name: Deploy Backend to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main
    paths:
      - 'backend/php/**'

jobs:
  deploy:
    name: Package & Deploy to AWS Beanstalk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Generate Deployment Package
        run: |
          cd backend/php
          zip -r ../../deploy.zip .
          cd ../..

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: attendify-backend
          environment_name: Attendify-backend-env
          version_label: backend-${{ github.sha }}-${{ github.run_number }}
          region: us-east-1
          deployment_package: deploy.zip
